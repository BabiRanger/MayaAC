<div class="exercise-container">
    <h2 style="color: #1e3a8a; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">Inverse Phasor</h2>
    <div class="problem-card">
        <span class="badge badge-easy"><i class="fa-solid fa-seedling"></i> Easy Level</span>
        
        <h3>Question 2</h3>
        <p>Obtain the sinusoid corresponding to the following phasor:</p>
        
        <div style="text-align: center; margin: 20px;">
            <div style="font-size: 20px; font-weight: bold;">
                $$ \mathbf{V}_1 = 60\angle15^\circ, \quad \omega = 1 $$
            </div>
        </div>

        <div class="user-input-area">
            <textarea id="student-answer" class="student-textarea" rows="3" placeholder="v(t) = ..."></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="ai-check-btn" 
                    onclick="checkAnswerWithAI('Convert phasor V=60&lt;15 with w=1 to time domain', 'Step 1: Identify the components from the polar form V = A /_ phi. Here, the amplitude A = 60 and the phase angle phi = 15 degrees. Step 2: Use the standard inverse phasor formula to return to the time domain: v(t) = A*cos(w*t + phi). Step 3: Substitute the given values (A = 60, w = 1, and phi = 15 degrees) into the expression to yield: v(t) = 60cos(t + 15 degrees) V.')">
                    Check Answer
                </button>
                
                <button class="ai-check-btn" style="background-color: #6b7280;" 
                    onclick="showFullSolution('Step 1: Identify the components from the polar form V = A /_ phi. Here, the amplitude A = 60 and the phase angle phi = 15 degrees. Step 2: Use the standard inverse phasor formula to return to the time domain: v(t) = A*cos(w*t + phi). Step 3: Substitute the given values (A = 60, w = 1, and phi = 15 degrees) into the expression to yield: v(t) = 60cos(t + 15 degrees) V.')">
                    Show Full Solution
                </button>
            </div>
            
            <div id="ai-feedback" class="ai-feedback-box"></div>
        </div>

        <div class="hint-section">
            <details>
                <summary>💡 Hint 1: General Form</summary>
                <p>If $\mathbf{V} = A\angle\phi$, then $v(t) = A \cos(\omega t + \phi)$.</p>
            </details>
            <details>
                <summary>🔑 Show Answer</summary>
                <p><strong>Answer:</strong> $60 \cos(t + 15^\circ)$ V</p>
            </details>
        </div>
    </div>
</div>
