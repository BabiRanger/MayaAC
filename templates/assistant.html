<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/assist-style.css') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!--MathJax for LaTeX formulas-->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$','$'],['\\(','\\)']],
                displayMath: [['$$','$$'],['\\[','\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

    <div class="chat-window w-full max-w-4xl h-[90vh] bg-white shadow-2xl rounded-lg flex flex-col">
            
        <!--Header-->
        <div class="bg-blue-600 text-white p-5 rounded-t-lg flex items-center justify-between shadow-md">
            <h1 class="text-2xl font-bold">AC Circuit Analysis Assistant</h1>
            <div class="flex items-center gap-4">

                <!--Clear Button-->
                <button id="clear-chat-btn" class="text-blue-200 hover:text-white transition-colors" title="Clear Chat History">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
           
                <a href="{{ url_for('home') }}" class="text-blue-200 hover:text-white transition-colors" title="Back to Home">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6-4a1 1 0 001-1v-1a1 1 0 10-2 0v1a1 1 0 001 1z" />
                    </svg>
                </a>
            </div>
        </div>

         <!--Message-->
        <div id="chat-messages" class="flex-grow p-6 overflow-y-auto">
            <!--Chat dynamically added here-->
        </div>

        <!--Input area-->
        <div class="p-5 bg-white border-t border-gray-200 rounded-b-lg">
            <div class="flex gap-3">
                <input type="text" id="chat-input" class="flex-1 border border-gray-300 rounded-full py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="Ask about resistors, capacitors, impedance...">
                <button id="send-button" class="bg-blue-600 text-white rounded-full p-3 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all active:scale-95">

                    <!--Send Icon-->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="{{url_for('static', filename='js/assist-script.js')}}" defer></script>

</body>
</html>
